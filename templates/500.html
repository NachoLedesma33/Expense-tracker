{% extends 'base.html' %}
{% load static %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<main class="p-8 flex items-center justify-center min-h-screen">
    <div class="text-center max-w-md">
        <h1 class="text-8xl font-bold text-gray-200 dark:text-gray-800 mb-4">500</h1>
        <h2 class="text-xl font-semibold mb-2">Something went wrong</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-6">An unexpected error occurred. Please try again later.</p>
        <a href="{% url 'core:home' %}" class="inline-flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium transition-all duration-200">
            Back to Dashboard
        </a>
    </div>
</main>
{% endblock %}
