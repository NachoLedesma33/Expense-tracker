<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold">New Category</h3>
        <button type="button" onclick="document.getElementById('transaction-modal').classList.add('hidden')" class="p-1 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <form
        hx-post="{% url 'transactions:category_create' %}"
        hx-target="#modal-content"
        novalidate
        class="space-y-5"
    >
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Category Name</label>
            <input type="text" name="name" value="{{ category_form.name.value|default:'' }}" placeholder="e.g. Food"
                required
                class="w-full px-4 py-2.5 rounded-xl border {% if category_form.name.errors %}border-red-400 dark:border-red-500{% else %}border-gray-200 dark:border-white/10{% endif %} bg-white dark:bg-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-all">
            {% if category_form.name.errors %}
            <p class="text-red-500 dark:text-red-400 text-xs mt-1.5 flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
                {{ category_form.name.errors.0 }}
            </p>
            {% endif %}
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="flex-1 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium transition-all duration-200 shadow-lg shadow-blue-500/20 hover:shadow-blue-600/30">Create</button>
            <button type="button" onclick="document.getElementById('transaction-modal').classList.add('hidden')" class="px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">Cancel</button>
        </div>
    </form>
</div>
