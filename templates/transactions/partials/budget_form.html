<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold">New Budget</h3>
        <button type="button" onclick="document.getElementById('budget-modal').classList.add('hidden')"
            class="p-1 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <form hx-post="{% url 'transactions:budget_create' %}"
          hx-target="#budget-modal-content"
          novalidate
          class="space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Category</label>
            <select name="category" id="id_category" required
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-white dark:bg-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-all">
                {% for cat in form.category.field.queryset %}
                <option value="{{ cat.id }}" {% if form.category.value|stringformat:"s" == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
            {% if form.category.errors %}
            <p class="text-red-500 dark:text-red-400 text-xs mt-1.5">{{ form.category.errors.0 }}</p>
            {% endif %}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Budget Amount</label>
            <input type="number" name="amount" id="id_amount" step="0.01" placeholder="0.00" required min="0.01"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-white dark:bg-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-all">
            {% if form.amount.errors %}
            <p class="text-red-500 dark:text-red-400 text-xs mt-1.5">{{ form.amount.errors.0 }}</p>
            {% endif %}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Month</label>
            <input type="month" name="month" value="{{ form.month.value|date:'Y-m'|default:'' }}"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-white dark:bg-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-all">
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit"
                class="flex-1 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium transition-all duration-200 shadow-lg shadow-blue-500/20">
                Create Budget
            </button>
            <button type="button"
                onclick="document.getElementById('budget-modal').classList.add('hidden')"
                class="px-4 py-2.5 rounded-xl border border-gray-200 dark:border-white/10 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                Cancel
            </button>
        </div>
    </form>
</div>
