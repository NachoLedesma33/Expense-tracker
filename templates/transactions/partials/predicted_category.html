<span class="text-blue-600 dark:text-blue-400 flex items-center gap-1.5">
    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
    </svg>
    Suggested: <strong>{{ category.name }}</strong>
    <span class="text-gray-400">({{ confidence }}%)</span>
    <button type="button" data-category-id="{{ category.id }}"
        class="accept-category text-green-600 dark:text-green-400 hover:text-green-700 dark:hover:text-green-300 font-medium ml-1">
        Accept

    <span id="predict-spinner" class="htmx-indicator">

            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
    </span>
