<div class="divide-y divide-gray-100">
    {% for t in transactions %}
    <div class="px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors" id="transaction-{{ t.id }}">
        <div class="flex items-center gap-3 min-w-0 flex-1">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 {% if t.type == 'income' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
                {% if t.type == 'income' %}+{% else %}-{% endif %}
            </div>
            <div class="min-w-0">
                <p class="text-sm font-medium text-gray-800 truncate">{{ t.title }}</p>
                <p class="text-xs text-gray-500">{{ t.date|date:"M d, Y" }} · {{ t.category|default:"Uncategorized" }}</p>
            </div>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0 ml-4">
            <span class="text-sm font-semibold {% if t.type == 'income' %}text-green-600{% else %}text-red-600{% endif %}">
                {% if t.type == 'income' %}+{% else %}-{% endif %}${{ t.amount|floatformat:2 }}
            </span>
            <button
                hx-get="{% url 'transactions:update' t.id %}"
                hx-target="#modal-content"
                hx-trigger="click"
                class="text-gray-400 hover:text-gray-600 transition-colors"
                onclick="document.getElementById('transaction-modal').classList.remove('hidden')"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
            </button>
            <button
                hx-post="{% url 'transactions:delete' t.id %}"
                hx-target="#transaction-{{ t.id }}"
                hx-swap="outerHTML swap:0.5s"
                hx-confirm="Delete this transaction?"
                class="text-gray-400 hover:text-red-600 transition-colors"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </button>
        </div>
    </div>
    {% empty %}
    <div class="px-6 py-8 text-center text-gray-500">
        No transactions found.
    </div>
    {% endfor %}
</div>
